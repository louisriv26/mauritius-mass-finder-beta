<!doctype html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mauritius Mass Finder v24.24.0</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a3434">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&display=swap');
:root{
  --bg:#fbf7f2;--ink:#1e1510;--muted:#6b5f58;--soft:#8a7c74;
  --line:#e8ddd4;--line2:#d6c3b5;
  --acc:#6f2c2c;--acc2:#4a1c1c;--acc-s:#f4e6de;--acc-s2:#fbf0ea;
  --gold:#b08050;
  --ok:#edf6ee;--ok-b:#c8e3ca;--warn:#fff8e0;--warn-b:#e8d88a;
  --sh:0 8px 24px rgba(50,24,12,.08);--sh2:0 18px 48px rgba(50,24,12,.13);--sh3:0 28px 72px rgba(50,24,12,.18);
  --focus:0 0 0 3px rgba(111,44,44,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;
  -webkit-font-smoothing:antialiased;padding-bottom:90px;
}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 20px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:none;box-shadow:var(--focus)}
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.modalOpen{overflow:hidden}

/* UPDATE BANNER */
.updateBanner{
  display:none;align-items:center;justify-content:space-between;gap:10px;
  background:var(--warn);border:1px solid var(--warn-b);
  border-radius:14px;padding:11px 13px;margin:10px 14px 0;box-shadow:var(--sh);
}
.updateBanner b{display:block;font-size:14px;font-weight:700}
.updateBanner .small{font-size:12px;color:var(--muted);margin-top:2px}
.updateActions{display:flex;gap:6px;flex:0 0 auto}
.updateActions button{font-size:12px;font-weight:700;padding:7px 10px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);min-height:34px}
.updateActions .primary{background:var(--acc);color:#fff;border-color:var(--acc)}
@media(max-width:480px){.updateBanner{align-items:flex-start;flex-direction:column}.updateActions{width:100%}.updateActions button{flex:1}}

/* HERO */
.hero{
  background:linear-gradient(145deg,#7a3434 0%,#572020 48%,#341212 100%);
  border-radius:0 0 26px 26px;padding:14px 0 0;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(80,20,20,.28);
}
.hero:before{
  content:'';position:absolute;inset:-30% -10% auto auto;
  width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 65%);
  pointer-events:none;
}
.heroInner{padding:0 14px}
.heroTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;position:relative}
.heroTitle{color:#fff;font-size:clamp(17px,4.8vw,22px);font-weight:900;letter-spacing:-.04em;line-height:1.1}
.heroSub{color:rgba(255,255,255,.7);font-size:11.5px;margin-top:2px}
.langPill{display:flex;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:3px;gap:2px;flex:0 0 auto}
.langPill button{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;color:rgba(255,255,255,.72);min-height:30px;transition:background .14s,color .14s}
.langPill button.active{background:#fff;color:var(--acc)}

/* HERO SEARCH — full-width strip */
.heroSearch{
  background:rgba(255,255,255,.97);
  display:flex;align-items:center;gap:8px;
  padding:11px 14px;
}
.heroSearch input{
  flex:1;border:none;background:transparent;
  font:inherit;font-size:15px;font-weight:400;color:var(--ink);
  outline:none;min-height:0;padding:0;
}
.heroSearch input::placeholder{color:#a09088}
.hsIcon{font-size:15px;opacity:.42;flex:0 0 auto}
.hsClear{font-size:12px;font-weight:700;color:var(--acc);padding:4px 8px;border-radius:8px;background:var(--acc-s);flex:0 0 auto;display:none}
.hsClear.show{display:block}

/* INTENT ROW — parsed chips shown below search */
.intentRow{
  background:rgba(255,255,255,.97);
  padding:5px 14px 9px;
  display:flex;flex-wrap:wrap;gap:5px;
  border-top:1px solid rgba(210,185,165,.5);
}
.intentRow:empty{display:none}
.iChip{font-size:11px;font-weight:700;background:var(--acc-s);border:1px solid rgba(111,44,44,.2);color:var(--acc2);border-radius:999px;padding:3px 8px}

/* SEARCH ASSIST */
.searchAssist{
  background:#fff;border:1px solid var(--line);
  border-radius:0 0 14px 14px;
  padding:8px 14px 10px;
  box-shadow:0 8px 20px rgba(50,24,12,.1);
  position:relative;z-index:5;
}
.searchAssist[hidden]{display:none}
.assistTitle{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.assistChips{display:flex;flex-wrap:wrap;gap:5px}
.assistChip{font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;background:var(--acc-s2);border:1px solid var(--line);color:var(--ink)}
.assistChip:active{background:var(--acc-s)}
.assistClear{background:transparent;color:var(--muted);border:none;font-size:11px;padding:2px 4px;min-height:24px}

/* QUICK PILLS */
.pillsWrap{
  padding:11px 0 3px;overflow-x:auto;scrollbar-width:none;
  display:flex;gap:7px;-webkit-overflow-scrolling:touch;
}
.pillsWrap::-webkit-scrollbar{display:none}
.qpill{
  flex:0 0 auto;font-size:13px;font-weight:700;
  padding:8px 14px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--ink);
  white-space:nowrap;min-height:38px;
  transition:transform .12s,background .12s,border-color .12s;
}
.qpill:active{transform:scale(.97)}
.qpill.prime{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 4px 16px rgba(111,44,44,.24)}
.qpill.today{background:var(--acc-s2);border-color:#ddc8bb;color:var(--acc2)}

/* NEXT MASS CARD */
.nextCard{
  background:linear-gradient(135deg,#fffefa,#fff5ee);
  border:1px solid #ddc4b5;border-radius:20px;
  padding:14px 16px;margin:10px 0;
  position:relative;overflow:hidden;box-shadow:var(--sh2);
}
.nextCard:before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--acc),var(--gold));
  border-radius:20px 0 0 20px;
}
.ncLabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.ncMain{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ncLeft{min-width:0;flex:1}
.ncSite{font-size:17px;font-weight:850;letter-spacing:-.03em;line-height:1.2;overflow-wrap:anywhere}
.ncMeta{font-size:12px;color:var(--muted);margin-top:3px}
.ncTime{text-align:right;flex:0 0 auto}
.ncT{font-size:34px;font-weight:950;color:var(--acc);letter-spacing:-.06em;line-height:1;font-variant-numeric:tabular-nums}
.ncRel{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap}
.ncActions{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
.ncBtn{
  font-size:12px;font-weight:700;padding:7px 12px;border-radius:10px;
  border:1px solid var(--line);background:#fff;color:var(--ink);min-height:36px;
  display:inline-flex;align-items:center;gap:4px;
  transition:background .12s,border-color .12s;
}
.ncBtn:hover{background:var(--acc-s2);border-color:#d8c0b0}
.ncBtn.prime{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 4px 14px rgba(111,44,44,.2)}
.ncBtn.prime:hover{background:var(--acc2)}

/* RESULTS HEADER */
.resultsHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 4px}
.resultsCount{font-size:12px;color:var(--muted);font-weight:500}
.filterBtn{
  font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--ink);
  display:flex;align-items:center;gap:4px;transition:background .12s;
}
.filterBtn.hasFilters{background:var(--acc);color:#fff;border-color:var(--acc)}
.filterDot{width:7px;height:7px;border-radius:50%;background:currentColor;display:none;margin-left:1px;opacity:.7}
.filterBtn.hasFilters .filterDot{display:inline-block}

/* RESULT CARDS */
#results{margin-top:4px}
.card,.card *{box-sizing:border-box}
.card{
  background:#fff;border:1px solid var(--line);border-radius:20px;
  padding:15px 16px;margin-bottom:10px;
  position:relative;overflow:hidden;
  box-shadow:var(--sh);
  transition:transform .14s,box-shadow .14s,border-color .14s;
}
.card:before{
  content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;
  border-radius:0 3px 3px 0;background:rgba(111,44,44,.25);
}
.card:hover{transform:translateY(-1px);box-shadow:var(--sh2);border-color:var(--line2)}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;min-width:0}
.top>div:first-child{min-width:0;flex:1 1 auto}
.site{font-size:clamp(15px,4vw,18px);font-weight:850;letter-spacing:-.035em;line-height:1.15;margin-bottom:3px;overflow-wrap:anywhere}
.meta{font-size:13px;color:var(--muted);line-height:1.35}
.timeBox{flex:0 0 auto;min-width:80px;max-width:34%;text-align:right;padding-left:8px;overflow:visible}
.time{
  display:block;font-size:clamp(26px,7vw,34px);font-weight:950;color:var(--acc);
  letter-spacing:-.05em;line-height:1;font-variant-numeric:tabular-nums;
  white-space:nowrap;overflow:visible;
}
.relative{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.badge{font-size:11px;padding:3px 8px;border-radius:999px;background:#faf6f3;border:1px solid var(--line);color:#4a3f38;font-weight:600}
.badge.mass{background:var(--acc-s);border-color:#d8c0b0;color:#5a2424;font-weight:700}
.badge.soon{background:var(--ok);border-color:var(--ok-b);color:#2a5e2a;font-weight:700}
.badge.warn{background:var(--warn);border-color:var(--warn-b);color:#5a4800}
.verifiedChip.stale{background:var(--warn);border-color:var(--warn-b);color:#5a4800}
.verifiedChip.old{background:#fff0ef;border-color:#e8b0b0;color:#6a1a1a;font-weight:700}
.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.actions a,.actions button{
  font-size:12px;font-weight:700;padding:7px 11px;border-radius:10px;
  border:1px solid var(--line);background:#fff;color:var(--ink);
  min-height:36px;display:inline-flex;align-items:center;justify-content:center;gap:4px;
  flex:1 1 calc(50% - 6px);
  transition:background .12s,border-color .12s;
}
.actions a:hover,.actions button:hover{background:var(--acc-s2);border-color:#d8c0b0}
.actions .primarylink{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 4px 12px rgba(111,44,44,.18)}
.actions .primarylink:hover{background:var(--acc2);border-color:var(--acc2)}
.fav.active{background:linear-gradient(180deg,#fff5c0,#ffea90);border-color:#d8c060}
.small{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}
.vigilLine{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic}

/* EMPTY STATE */
.empty{
  text-align:center;padding:28px 16px;
  background:linear-gradient(180deg,#fff,#fdf8f4);
  border:1px dashed var(--line2);border-radius:20px;color:var(--muted);margin-bottom:10px;
}
.empty .actions a,.empty .actions button{flex:0 1 auto}

/* NOTICES */
.notice{padding:10px 13px;border-radius:14px;margin:6px 0;font-size:13px}
.notice.ok{background:var(--ok);border:1px solid var(--ok-b)}
.notice.warn{background:var(--warn);border:1px solid var(--warn-b)}
.trustStrip{background:linear-gradient(135deg,#eef8ef,#fffaf4)!important;border:1px solid #cde8ce!important}
#stats{margin:10px 0 4px}
.searchIntentNotice .badge{display:inline-block;margin:1px 2px 0}
.intentChips{display:inline-flex;flex-wrap:wrap;gap:3px;margin-left:3px}
.searchHint{font-size:12px;color:var(--soft);margin:4px 2px;font-weight:500}

/* FILTER SHEET */
.filterOverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(25,14,8,.48);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.filterOverlay.open{opacity:1;pointer-events:auto}
.filterSheet{
  width:100%;background:#fff;border-radius:22px 22px 0 0;
  padding:0 16px calc(20px + env(safe-area-inset-bottom));
  max-height:90vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .24s cubic-bezier(.32,1,.64,1);
  box-shadow:0 -10px 60px rgba(50,24,12,.22);
}
.filterOverlay.open .filterSheet{transform:translateY(0)}
.filterSheetHandle{width:40px;height:4px;background:var(--line2);border-radius:99px;margin:12px auto 14px}
.filterSheetTitle{font-size:16px;font-weight:800;letter-spacing:-.03em;margin-bottom:14px}
.filterSection{margin-bottom:14px}
.filterLabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.filterTags{display:flex;flex-wrap:wrap;gap:6px}
.ftag{
  font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;
  border:1px solid var(--line);background:#faf6f3;color:var(--ink);
  transition:background .12s,border-color .12s;min-height:36px;
}
.ftag.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.filterSheetApply{
  width:100%;padding:13px;background:var(--acc);color:#fff;
  border-radius:20px;font-size:15px;font-weight:800;
  margin-top:14px;box-shadow:0 8px 24px rgba(111,44,44,.22);
}

/* MY CHURCHES */
.savedView{display:none}
.savedView.visible{display:block}
.savedViewHead{padding:14px 0 10px;display:flex;justify-content:space-between;align-items:baseline}
.savedViewTitle{font-size:19px;font-weight:900;letter-spacing:-.04em}
.savedCard{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-bottom:10px;box-shadow:var(--sh)}
.savedCardHead{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.savedChurchName{font-size:16px;font-weight:800;letter-spacing:-.03em;line-height:1.2}
.savedMeta{font-size:12px;color:var(--muted);margin-top:2px}
.savedHeart{font-size:18px;flex:0 0 auto;line-height:1;margin-top:1px;cursor:pointer;border:none;background:transparent;padding:2px}
.savedNext{background:var(--acc-s2);border-top:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.savedNextLabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:3px}
.savedNextRow{display:flex;align-items:baseline;gap:7px}
.savedNextTime{font-size:24px;font-weight:950;color:var(--acc);letter-spacing:-.05em;line-height:1;font-variant-numeric:tabular-nums}
.savedNextWhen{font-size:11px;color:var(--muted)}
.savedNextBtns{display:flex;gap:5px;flex:0 0 auto}
.savedNextBtn{font-size:11px;font-weight:700;padding:6px 10px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);min-height:32px;white-space:nowrap;transition:background .12s}
.savedNextBtn.prime{background:var(--acc);color:#fff;border-color:var(--acc)}
.savedEmpty{text-align:center;padding:36px 20px;color:var(--muted)}
.savedEmpty-icon{font-size:38px;margin-bottom:12px}
.savedEmpty-title{font-size:17px;font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:6px}
.savedEmpty-sub{font-size:13px;line-height:1.5}

/* MODALS */
.modalOverlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modalOverlay[hidden]{display:none}
.modalBackdrop{position:absolute;inset:0;background:rgba(25,14,8,.5)}
.modalPanel{
  position:relative;width:min(640px,100%);max-height:min(88vh,700px);
  overflow:auto;background:#fff;border-radius:26px;
  box-shadow:var(--sh3);padding:20px;
}
.modalHead{
  position:sticky;top:-20px;z-index:4;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin:-20px -20px 12px;padding:16px 20px 13px;
  background:#fff;border-bottom:1px solid var(--line);
  border-radius:26px 26px 0 0;
}
.modalHead h2{margin:0;font-size:20px;font-weight:850;letter-spacing:-.04em}
.modalClose{
  border:1px solid var(--line);background:#fff;border-radius:999px;
  width:36px;height:36px;font-size:20px;
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;
  transition:background .12s;
}
.modalClose:hover{background:var(--acc-s)}
.modalFoot{
  position:sticky;bottom:-20px;z-index:3;
  margin:16px -20px -20px;padding:12px 20px;
  background:#fff;border-top:1px solid var(--line);
  display:flex;justify-content:flex-end;border-radius:0 0 26px 26px;
}
.modalFoot button{padding:10px 20px;background:var(--acc);color:#fff;border-radius:18px;font-size:14px;font-weight:700;min-width:100px}
.helpContent h3{margin:8px 0 10px;font-size:16px;font-weight:800}
.helpContent h4{margin:14px 0 4px;font-size:14px;font-weight:700}
.helpContent p{margin:4px 0;color:var(--muted);font-size:14px}
.onboardingCard{text-align:center;padding:8px 0}
.onboardingIcon{font-size:44px;margin:8px 0 14px;line-height:1}
.onboardingStep{font-size:12px;color:var(--muted);margin-bottom:6px}
.onboardingCard h2{font-size:20px;font-weight:850;letter-spacing:-.04em;margin-bottom:8px}
.onboardingCard p{font-size:14px;color:var(--muted);line-height:1.5}
.onboardingActions{display:flex;gap:8px;justify-content:center;margin-top:18px}
.onboardingActions button{padding:10px 20px;border-radius:18px;font-size:14px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--ink);min-width:90px;min-height:44px}
.onboardingActions .primary{background:var(--acc);color:#fff;border-color:var(--acc)}

/* LOCATION PROMPT */
.locationPrompt{display:none;background:var(--acc-s2);border:1px solid #d8c0b0;border-radius:20px;padding:14px;margin:10px 0;gap:12px;align-items:flex-start}

/* TOAST */
.toast{
  position:fixed;left:50%;bottom:100px;
  transform:translateX(-50%) translateY(12px);
  z-index:500;background:#1e1510;color:#fff;
  border-radius:999px;padding:10px 16px;font-size:13px;font-weight:700;
  box-shadow:0 10px 30px rgba(25,12,4,.28);
  opacity:0;pointer-events:none;transition:opacity .16s,transform .16s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bottomNav{
  position:fixed;left:0;right:0;bottom:0;z-index:100;
  padding:6px max(10px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-right));
  background:linear-gradient(180deg,rgba(251,247,242,0),rgba(251,247,242,.97) 20%,rgba(251,247,242,1));
  backdrop-filter:blur(16px) saturate(1.2);
}
.bottomNavInner{
  max-width:680px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;
  padding:6px;border:1px solid rgba(210,188,172,.8);border-radius:22px;
  background:rgba(255,253,250,.94);box-shadow:0 16px 50px rgba(50,24,12,.16);
}
.navBtn{
  border:none;background:transparent;border-radius:16px;min-height:52px;padding:6px 3px;
  font-size:11px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:background .14s,color .14s;
}
.navBtn span:first-child{font-size:18px;line-height:1.2}
.navBtn.active{background:linear-gradient(180deg,var(--acc-s),var(--acc-s2));color:var(--acc);font-weight:700}

/* FOOTER */
details{margin:14px 0;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px 16px}
details summary{font-weight:800;cursor:pointer;font-size:14px;letter-spacing:-.02em}
footer{font-size:12px;color:var(--muted);margin:14px 0 4px;text-align:center;line-height:1.5}
.versionFooter{font-size:11px;color:var(--soft);text-align:center;margin:4px 0 10px}
.footerTools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.inlineHelpBtn{
  font-size:12px;font-weight:700;padding:8px 12px;border-radius:999px;min-height:36px;
  border:1px solid rgba(111,44,44,.18);background:rgba(255,255,255,.8);color:var(--acc);
  display:inline-flex;align-items:center;transition:background .12s;
}
.inlineHelpBtn:hover{background:var(--acc-s2)}

@media(max-width:400px){
  .time{font-size:clamp(24px,7.5vw,30px)}
  .timeBox{min-width:72px}
  .site{font-size:15px}
  .heroTitle{font-size:17px}
  .ncT{font-size:28px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<!-- HERO (search lives here) -->
<header class="hero" id="heroHeader">
  <div class="heroInner">
    <div class="heroTop">
      <div>
        <div class="heroTitle" data-i18n="appTitle">Mauritius Mass Finder</div>
        <div class="heroSub" data-i18n="heroText">Find a Mass quickly anywhere in Mauritius</div>
      </div>
      <div class="langPill" aria-label="Language">
        <button id="langEn" type="button">EN</button>
        <button id="langFr" type="button">FR</button>
      </div>
    </div>
  </div>
  <!-- Search strip — bleeds full width inside hero -->
  <div class="heroSearch">
    <span class="hsIcon" aria-hidden="true">🔍</span>
    <label class="sr-only" for="q" data-i18n="searchLabel">Search</label>
    <input id="q" type="search" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
      data-i18n-placeholder="searchPlaceholder" placeholder="Search place, time, or church…"
      aria-label="Search by place, time, parish, church, or town">
    <button class="hsClear" id="searchClearBtn" type="button" aria-label="Clear search">✕ Clear</button>
  </div>
  <!-- Intent chips injected by JS -->
  <div class="intentRow" id="intentRow"></div>
  <!-- Autocomplete -->
  <div class="searchAssist" id="searchAssist" hidden aria-live="polite"></div>
</header>

<div class="wrap">

  <!-- QUICK INTENT PILLS -->
  <div class="pillsWrap" aria-label="Quick actions" role="toolbar">
    <button class="qpill prime" id="qaNow" type="button" data-i18n="qaNowTitle">⚡ Next Mass</button>
    <button class="qpill today" id="qaToday" type="button" data-i18n="qaTodayTitle">Today</button>
    <button class="qpill today" id="qaTomorrow" type="button" data-i18n="qaTomorrowTitle">Tomorrow</button>
    <button class="qpill" id="qaNear" type="button" data-i18n="qaNearTitle">📍 Near me</button>
    <button class="qpill" id="qaSunday" type="button" data-i18n="qaSundayTitle">☀️ Sunday</button>
    <button class="qpill" id="qaFav" type="button" data-i18n="qaFavTitle">⭐ My Churches</button>
  </div>

  <!-- NEXT MASS HERO CARD -->
  <div id="nextHero" aria-live="polite"></div>

  <!-- TRUST / STATS -->
  <section id="stats"></section>
  <section id="notice"></section>

  <!-- RESULTS HEADER (count + filter button) -->
  <div class="resultsHeader" id="resultsHeader" style="display:none">
    <span class="resultsCount" id="resultsCount"></span>
    <button class="filterBtn" id="filterToggleBtn" type="button">
      ⚙ <span data-i18n="filtersLabel">Filters</span>
      <span class="filterDot"></span>
    </button>
  </div>

  <!-- MY CHURCHES VIEW -->
  <div class="savedView" id="savedView">
    <div class="savedViewHead">
      <span class="savedViewTitle" data-i18n="myChurches">My Churches</span>
      <button class="inlineHelpBtn" id="addChurchBtn" type="button" style="font-size:11px" data-i18n="favEmptySearch">Search to add</button>
    </div>
    <div id="savedList"></div>
  </div>

  <!-- RESULTS -->
  <section id="results" aria-live="polite"></section>

  <!-- FOOTER -->
  <details id="aboutPanel">
    <summary data-i18n="aboutTitle">About this app</summary>
    <div data-i18n-html="aboutHtml"></div>
    <div id="howUpdatePanel"><div data-i18n-html="howUpdateHtml"></div></div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px"><span data-i18n="versionWord">Version</span> <span id="aboutVersion"></span></p>
  </details>
  <details id="whatsNewPanel">
    <summary data-i18n="whatNewTitle">What's new</summary>
    <div data-i18n-html="whatNewHtml"></div>
  </details>
  <footer data-i18n="footerNote">Sources are linked on each result.</footer>
  <div class="versionFooter" id="versionFooter"></div>
  <div class="footerTools">
    <button class="inlineHelpBtn" id="helpBtn" type="button" data-i18n="helpLink">Help</button>
    <button class="inlineHelpBtn" id="howUpdateBtn" type="button" data-i18n="howUpdateLink">How to update</button>
    <button class="inlineHelpBtn" id="shareAppBtn" type="button" data-i18n="shareApp">Share app</button>
  </div>
</div>

<!-- FILTER BOTTOM SHEET -->
<div class="filterOverlay" id="filterOverlay" role="dialog" aria-modal="true" aria-label="Filters">
  <div class="filterSheet" id="filterSheet">
    <div class="filterSheetHandle"></div>
    <div class="filterSheetTitle" data-i18n="filtersLabel">Filters</div>
    <!-- Hidden real selects — values synced from pill tags by JS -->
    <select id="day" class="sr-only" aria-label="Day filter"></select>
    <select id="region" class="sr-only" aria-label="Region filter"><option value="">All regions</option></select>
    <select id="timeOfDay" class="sr-only" aria-label="Time of day filter">
      <option value="">All day</option><option value="morning">Morning</option>
      <option value="afternoon">Afternoon</option><option value="evening">Evening</option>
    </select>
    <select id="mode" class="sr-only" aria-label="Mode filter">
      <option value="mass">Masses only</option><option value="all">All</option>
    </select>
    <div class="filterSection">
      <div class="filterLabel" data-i18n="dayFilterLabel">Day</div>
      <div class="filterTags" id="dayTags"></div>
    </div>
    <div class="filterSection">
      <div class="filterLabel" data-i18n="timeOfDayFilterLabel">Time of day</div>
      <div class="filterTags" id="timeTags"></div>
    </div>
    <div class="filterSection">
      <div class="filterLabel" data-i18n="regionFilterLabel">Region</div>
      <div class="filterTags" id="regionTags"></div>
    </div>
    <div class="filterSection">
      <div class="filterLabel" data-i18n="modeFilterLabel">Type</div>
      <div class="filterTags" id="modeTags"></div>
    </div>
    <button class="filterSheetApply" id="filterApplyBtn" type="button" data-i18n="showResults">Show results</button>
  </div>
</div>

<!-- HELP MODAL -->
<div class="modalOverlay" id="helpModal" role="dialog" aria-modal="true" aria-labelledby="helpModalTitle" hidden>
  <div class="modalBackdrop" id="helpBackdrop"></div>
  <section class="modalPanel" tabindex="-1">
    <div class="modalHead">
      <h2 id="helpModalTitle" data-i18n="helpTitle">Help</h2>
      <button class="modalClose" id="helpClose" type="button" aria-label="Close">×</button>
    </div>
    <div class="helpContent" id="helpModalBody"></div>
    <div class="modalFoot"><button id="helpBottomClose" type="button" data-i18n="backToResults">Back to results</button></div>
  </section>
</div>

<!-- ONBOARDING MODAL -->
<div class="modalOverlay" id="onboardingModal" role="dialog" aria-modal="true" aria-labelledby="onboardingTitle" hidden>
  <div class="modalBackdrop" id="onboardingBackdrop"></div>
  <section class="modalPanel onboardingCard" tabindex="-1">
    <div class="onboardingStep" id="onboardingStep">1 / 3</div>
    <div class="onboardingIcon" aria-hidden="true">⛪</div>
    <h2 id="onboardingTitle">Search quickly</h2>
    <p id="onboardingText" class="small"></p>
    <div class="onboardingActions">
      <button id="onboardingSkip" type="button">Skip</button>
      <button class="primary" id="onboardingNext" type="button">Next</button>
    </div>
  </section>
</div>

<!-- BOTTOM NAV -->
<nav class="bottomNav" aria-label="Main navigation" data-i18n-aria-label="mainNavigation">
  <div class="bottomNavInner">
    <button class="navBtn active" id="navHome" type="button"><span>🏠</span><span data-i18n="navHome">Home</span></button>
    <button class="navBtn" id="navSearch" type="button"><span>🔍</span><span data-i18n="navSearch">Search</span></button>
    <button class="navBtn" id="navNear" type="button"><span>📍</span><span data-i18n="navNear">Near me</span></button>
    <button class="navBtn" id="navFav" type="button"><span>⭐</span><span data-i18n="navFav">My Churches</span></button>
    <button class="navBtn" id="navMore" type="button"><span>⚙️</span><span data-i18n="navMore">More</span></button>
  </div>
</nav>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
